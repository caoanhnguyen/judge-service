server:
  port: 8090

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

minio:
  endpoint: http://${MINIO_HOST:localhost}:${MINIO_API_PORT:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}

oj:
  judge:
    # 1. Thư mục Host làm việc cho Docker (chứa code user nộp)
    work-dir: ${JUDGE_WORK_DIR:D:\KMA_Docs\Final_KMA\source_code\oj-sandbox\work-dir}

    # 2. Thư mục Host Cache để tải testcase từ MinIO về
    cache-dir: ${JUDGE_CACHE_DIR:D:\KMA_Docs\Final_KMA\source_code\oj-sandbox\testcases-cache}

    container:
      # Container Name
      image-name: ${CONTAINER_IMAGE_NAME:oj-sandbox:v1}
      # Thư mục gốc chứa code bên trong Docker
      work-dir: ${CONTAINER_WORK_DIR:/sandbox/app}
      # Thư mục chứa đề bài/testcase bên trong Docker
      testcase-dir: ${CONTAINER_TESTCASE_DIR:/testcases}
      # Giới hạn dung lượng file output tối đa (ulimit -f). Tính bằng KB. 32768 = 32MB
      max-output-kb: ${CONTAINER_MAX_OUTPUT_KB:32768}
      # Giới hạn dung lượng file output để Java check OLE. Tính bằng MB.
      max-output-mb: ${CONTAINER_MAX_OUTPUT_MB:31}
      # Giới hạn PID
      pids-limit: ${CONTAINER_PIDS_LIMIT:64}
      # Giới hạn thời gian compile
      compile-timeout-ms: ${COMPILE_TIMEOUT_MS:15000}
      # Giới hạn CPU
      cpus: ${JUDGE_CONTAINER_CPUS:1.0}
      # Read only rootfs
      readonly-rootfs: ${JUDGE_CONTAINER_READONLY_ROOTFS:true}
      # Drop capabilities (ví dụ: NET_ADMIN, SYS_ADMIN, IPC_LOCK, etc.) để tăng cường bảo mật
      drop-caps: ${JUDGE_CONTAINER_DROP_CAPS:true}


  storage:
    minio:
      bucket-testcase: ${MINIO_BUCKET_TESTCASE:oj-testcases}
      prefix-problem: problems
      suffix-testcase: testcases